<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Simulador de Churn de Clientes</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#e2e8f0;
display:flex;
}

.sidebar{
width:320px;
background:#111827;
padding:20px;
height:100vh;
overflow:auto;
}

.sidebar h2{
margin-top:0;
}

input,select{
width:100%;
padding:6px;
margin-bottom:10px;
border-radius:4px;
border:none;
}

button{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.dashboard{
flex:1;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
grid-gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.full{
grid-column:1/3;
}

ul{
padding-left:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Simulador de Cliente</h2>

<label>Género</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Adulto mayor</label>
<select id="SeniorCitizen">
<option value="0">No</option>
<option value="1">Sí</option>
</select>

<label>Tiene pareja</label>
<select id="Partner">
<option>Yes</option>
<option>No</option>
</select>

<label>Tiene dependientes</label>
<select id="Dependents">
<option>No</option>
<option>Yes</option>
</select>

<label>Antigüedad (meses)</label>
<input id="tenure" type="number" value="12">

<label>Servicio telefónico</label>
<select id="PhoneService">
<option>Yes</option>
<option>No</option>
</select>

<label>Múltiples líneas</label>
<select id="MultipleLines">
<option>No</option>
<option>Yes</option>
<option>No phone service</option>
</select>

<label>Servicio de Internet</label>
<select id="InternetService">
<option>DSL</option>
<option>Fiber optic</option>
<option>No</option>
</select>

<label>Seguridad online</label>
<select id="OnlineSecurity">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>

<label>Backup online</label>
<select id="OnlineBackup">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>

<label>Protección de dispositivo</label>
<select id="DeviceProtection">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>

<label>Soporte técnico</label>
<select id="TechSupport">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>

<label>Streaming TV</label>
<select id="StreamingTV">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>

<label>Streaming Películas</label>
<select id="StreamingMovies">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>

<label>Tipo de contrato</label>
<select id="Contract">
<option>Month-to-month</option>
<option>One year</option>
<option>Two year</option>
</select>

<label>Facturación electrónica</label>
<select id="PaperlessBilling">
<option>Yes</option>
<option>No</option>
</select>

<label>Método de pago</label>
<select id="PaymentMethod">
<option>Electronic check</option>
<option>Mailed check</option>
<option>Bank transfer (automatic)</option>
<option>Credit card (automatic)</option>
</select>

<label>Cargo mensual</label>
<input id="MonthlyCharges" type="number" value="70">

<label>Llamadas a soporte</label>
<input id="CustomerSupportCalls" type="number" value="1">

<label>Quejas registradas</label>
<input id="ComplaintCount" type="number" value="0">

<label>Oferta de competidor</label>
<select id="CompetitorOffer">
<option>No</option>
<option>Yes</option>
</select>

<label>Satisfacción (1-10)</label>
<input id="CustomerSatisfactionScore" type="number" value="8">

<label>Pagos tardíos</label>
<input id="LatePayments" type="number" value="0">

<button onclick="predecir()">Predecir churn</button>

<p id="resultado"></p>

</div>

<div class="dashboard">

<div class="card">

<h3>Probabilidad de churn</h3>
<canvas id="probChart"></canvas>

</div>

<div class="card">

<h3>Impacto de factores</h3>
<canvas id="factorChart"></canvas>

</div>

<div class="card full">

<h3>Perfil de riesgo del cliente</h3>

<ul id="perfil">
<li>Segmento: -</li>
<li>Probabilidad estimada: -</li>
<li>Valor estimado del cliente: -</li>
</ul>

</div>

<div class="card full">

<h3>Motor de recomendaciones de retención</h3>

<ul id="recomendaciones">
<li>Ejecute una simulación para ver recomendaciones</li>
</ul>

</div>

</div>

<script>

const probChart=new Chart(
document.getElementById("probChart"),
{
type:"doughnut",
data:{
labels:["Churn","Permanece"],
datasets:[{
data:[50,50],
backgroundColor:["#ef4444","#10b981"]
}]
}
})

const factorChart=new Chart(
document.getElementById("factorChart"),
{
type:"bar",
data:{
labels:["Contrato","Antigüedad","Cargo mensual","Soporte"],
datasets:[{
label:"Impacto",
data:[10,10,10,10],
backgroundColor:"#3b82f6"
}]
}
})

function obtenerDatos(){

const MonthlyCharges=Number(document.getElementById("MonthlyCharges").value)
const tenure=Number(document.getElementById("tenure").value)

const TotalCharges=MonthlyCharges*tenure

return{

gender:document.getElementById("gender").value,
SeniorCitizen:Number(document.getElementById("SeniorCitizen").value),
Partner:document.getElementById("Partner").value,
Dependents:document.getElementById("Dependents").value,
tenure:tenure,
PhoneService:document.getElementById("PhoneService").value,
MultipleLines:document.getElementById("MultipleLines").value,
InternetService:document.getElementById("InternetService").value,
OnlineSecurity:document.getElementById("OnlineSecurity").value,
OnlineBackup:document.getElementById("OnlineBackup").value,
DeviceProtection:document.getElementById("DeviceProtection").value,
TechSupport:document.getElementById("TechSupport").value,
StreamingTV:document.getElementById("StreamingTV").value,
StreamingMovies:document.getElementById("StreamingMovies").value,
Contract:document.getElementById("Contract").value,
PaperlessBilling:document.getElementById("PaperlessBilling").value,
PaymentMethod:document.getElementById("PaymentMethod").value,
MonthlyCharges:MonthlyCharges,
TotalCharges:TotalCharges,
CustomerSupportCalls:Number(document.getElementById("CustomerSupportCalls").value),
ComplaintCount:Number(document.getElementById("ComplaintCount").value),
CompetitorOffer:document.getElementById("CompetitorOffer").value,
CustomerSatisfactionScore:Number(document.getElementById("CustomerSatisfactionScore").value),
LatePayments:Number(document.getElementById("LatePayments").value)

}

}

async function predecir(){

const data=obtenerDatos()

const res=await fetch("http://127.0.0.1:8000/predecir",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

const resultado=await res.json()

const prob=resultado.probabilidad_churn

probChart.data.datasets[0].data=[prob*100,(1-prob)*100]
probChart.update()

factorChart.data.datasets[0].data=[
data.Contract==="Month-to-month"?30:10,
data.tenure,
data.MonthlyCharges/5,
data.CustomerSupportCalls*5
]

factorChart.update()

const segmento=
prob>0.7?"ALTO RIESGO":
prob>0.4?"RIESGO MEDIO":
"BAJO RIESGO"

const valor=(data.MonthlyCharges*12).toFixed(2)

document.getElementById("perfil").innerHTML=
`
<li>Segmento: ${segmento}</li>
<li>Probabilidad estimada: ${(prob*100).toFixed(2)}%</li>
<li>Valor estimado del cliente: $${valor}</li>
`

generarRecomendaciones(data,prob)

}

function generarRecomendaciones(data,prob){

let rec=[]

if(prob>0.7){
rec.push("Ofrecer descuento o promoción personalizada")
rec.push("Contactar cliente con agente de retención")
}

if(data.CustomerSupportCalls>3){
rec.push("Asignar soporte técnico prioritario")
}

if(data.CustomerSatisfactionScore<6){
rec.push("Enviar encuesta de satisfacción")
}

if(data.LatePayments>2){
rec.push("Ofrecer plan de pago flexible")
}

if(data.CompetitorOffer==="Yes"){
rec.push("Ofrecer upgrade de plan")
}

if(data.Contract==="Month-to-month"){
rec.push("Incentivar contrato anual con descuento")
}

if(rec.length===0){
rec.push("Cliente estable, aplicar programa de fidelización")
}

const lista=document.getElementById("recomendaciones")
lista.innerHTML=""

rec.forEach(r=>{
const li=document.createElement("li")
li.innerText=r
lista.appendChild(li)
})

}

</script>

</body>
</html>
